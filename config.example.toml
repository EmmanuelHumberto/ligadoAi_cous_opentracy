[opentracy]
backend_url = "http://127.0.0.1:8002"
runtime_url = "http://127.0.0.1:8001"
agent_id = "cous"
timeout = 30
diagnosis_domain_id = ""
diagnosis_instance_id = ""
diagnosis_callback_endpoint = "http://localhost:8000/cous/diagnosis/callback"
diagnosis_auto_resolve_identity = false
diagnosis_domain_name = "tattoo_machines"
diagnosis_domain_version = "v1"
diagnosis_entity_type = "tattoo_machine"

[auth]
token_file = "~/.cous/opentracy_token"
env_var = "COUS_OPENTRACY_TOKEN"
api_token_file = "~/.ligadoai/api_token"
api_env_var = "COUS_OPENTRACY_API_TOKEN"
opentracy_env_file = "../OpenTracy/.env"
opentracy_env_key = "OPENTRACY_KNOWLEDGE_AUTH_TOKEN"
opentracy_measurements_env_key = "OPENTRACY_MEASUREMENTS_AUTH_TOKEN"

[memory]
max_history = 10
max_chars_before_summary = 16000

[chat]
conversations_dir = ".cous-data/conversations"

[mcp]
timeout_seconds = 30
max_restarts = 3
restart_backoff_seconds = 5

[logs]
events_file = ".cous-data/logs/events.jsonl"
max_size_mb = 10
backup_count = 3

[measurements]
storage_file = ".cous-data/measurements.json"

[knowledge]
poll_timeout_seconds = 120

[feedback]
storage_file = ".cous-data/feedback/records.jsonl"

[system_prompt]
cache_ttl_seconds = 300
snapshot_file = ".cous-data/system_prompt_snapshot.md"
